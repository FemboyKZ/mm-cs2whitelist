// Core Configuration File for CS2 Whitelist (Metamod Plugin)
// Place this file at: <game_root>/cfg/cs2whitelist/core.cfg

"cs2whitelist"
{
    "Config"
    {
        // Enable the server whitelist. Set to "0" to let everyone connect.
        "Enable"        "1"

        // Skip the whitelist check for players with any cs2admin flag
        // (requires mm-cs2admin to be loaded alongside this plugin).
        "Immunity"      "1"

        // Message printed to the player's console when they are kicked.
        "KickMessage"   "You are not whitelisted on this server."

        // Whitelist file name, relative to <game>/cfg/cs2whitelist/.
        "Filename"      "whitelist.txt"

        // Log failed join attempts.
        // 0 = off
        // 1 = always (console + <game>/addons/cs2whitelist/logs/YYYY-MM-DD.log)
        // 2 = once per player per map (first rejection only)
        "Log"           "0"
    }

    // Optional SQL database for persistent whitelist storage.
    // When enabled, entries are loaded from the DB on plugin load and every
    // map change. wl_add / wl_remove also write to the database.
    // Requires the sql_mm Metamod plugin to be loaded.
    "Database"
    {
        // Set to "1" to enable database persistence.
        "Enabled"   "0"

        // "sqlite" or "mysql"
        "Type"      "sqlite"

        // SQLite: path to .db file (relative to game root)
        "Path"      "addons/cs2whitelist/whitelist.db"

        // Table prefix  ->  table name: <prefix>_whitelist
        "Prefix"    "cs2wl"

        // MySQL settings (only used when Type is "mysql")
        "Host"      "localhost"
        "User"      "root"
        "Pass"      ""
        "Database"  "cs2whitelist"
        "Port"      "3306"
    }

    // Steam group whitelist - allow players that are members of one or more
    // Steam groups, without adding them individually to whitelist.txt.
    // Checks run in addition to the file whitelist (either source can grant access).
    "SteamGroups"
    {
        // Set to "1" to enable Steam group checks.
        "Enabled"   "0"

        // "xml"  - pre-fetches the full member list via Steam's public XML endpoint
        //          on plugin load and each map change. No API key required.
        //          Recommended for groups smaller than ~10 000 members.
        // "api"  - checks each connecting player individually via the Steam Web API.
        //          Requires a valid API key. Works for any group size but adds a
        //          brief async delay (up to Timeout seconds) before the check result
        //          is known.
        "Method"    "xml"

        // Steam Web API key - required only when Method is "api".
        // Obtain one at https://steamcommunity.com/dev/apikey
        "ApiKey"    ""

        // Seconds to wait for an async check before kicking the player.
        // Applies to both methods (xml: waiting for initial fetch; api: HTTP request).
        "Timeout"   "5"

        // One or more Steam group IDs (64/32-bit).
        // You can find it at: https://steamcommunity.com/groups/<name>/memberslistxml/?xml=1
        "Groups"
        {
            // "0"   "103582791429521408"
            // "1"   "42850207"
        }
    }
}
